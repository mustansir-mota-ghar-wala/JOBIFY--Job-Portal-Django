{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-body">
                <h2 class="mb-4">Post Job</h2>

                <form method="POST">
                    {% csrf_token %}

                    {% for field in form %}
                        <div class="mb-3">
                            {% if field.name == 'is_active' %}
                                <div class="form-check">
                                    {{ field }}
                                    <label class="form-check-label">{{ field.label }}</label>
                                </div>
                            {% else %}
                                <label class="form-label">{{ field.label }}</label>
                                {{ field }}
                            {% endif %}

                            {% if field.errors %}
                                <div class="text-danger small mt-1">
                                    {{ field.errors }}
                                </div>
                            {% endif %}
                        </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-success">Save Job</button>
                    <a href="{% url 'employer_job_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
